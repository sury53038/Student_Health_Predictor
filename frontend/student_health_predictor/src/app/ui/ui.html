<h5>Student Data Form</h5>

<form [formGroup]="studentdata" (ngSubmit)="SubmitForm()">

    <label>Sleep Duration</label>
    <input type="number" formControlName="sleep_duration" placeholder="Enter sleep duration">

    <label>Heart Rate</label>
    <input type="number" formControlName="heart_rate" placeholder="Enter heart rate">

    <label>BMI</label>
    <input type="number" formControlName="bmi" placeholder="Enter BMI">

    <label>Calorie Expenditure</label>
    <input type="number" formControlName="calorie_expenditure" placeholder="Enter calorie expenditure">

    <label>Step Count</label>
    <input type="number" formControlName="step_count" placeholder="Enter step count">

    <label>Exercise Duration</label>
    <input type="number" formControlName="exercise_duration" placeholder="Enter exercise duration">

    <label>Water Intake</label>
    <input type="number" formControlName="water_intake" placeholder="Enter water intake">

    <!-- Diet Type -->
    <label>Diet Type</label>
    <select formControlName="diet_type">
        <option value="">Select Diet Type</option>

        @for (diet of diet_type; track diet.value) {
            <option [value]="diet.value">
                {{ diet.label }}
            </option>
        }
    </select>

    <!-- Stress Level -->
    <label>Stress Level</label>
    <select formControlName="stress_level">
        <option value="">Select Stress Level</option>

        @for (stress of stress_level; track stress.value) {
            <option [value]="stress.value">
                {{ stress.label }}
            </option>
        }
    </select>

    <!-- Sleep Quality -->
    <label>Sleep Quality</label>
    <select formControlName="sleep_quality">
        <option value="">Select Sleep Quality</option>

        @for (sleep of sleep_quality; track sleep.value) {
            <option [value]="sleep.value">
                {{ sleep.label }}
            </option>
        }
    </select>

    <!-- Physical Activity -->
    <label>Physical Activity Level</label>
    <select formControlName="physical_activity_level">
        <option value="">Select Activity Level</option>

        @for (activity of physical_activity_level; track activity.value) {
            <option [value]="activity.value">
                {{ activity.label }}
            </option>
        }
    </select>

    <!-- Smoking / Alcohol -->
    <label>Smoking / Alcohol</label>
    <select formControlName="smoking_alcohol">
        <option value="">Select</option>

        @for (item of addictionLevel; track item.value) {
            <option [value]="item.value">
                {{ item.label }}
            </option>
        }
    </select>

    <!-- Gender -->
    <label>Gender</label>
    <select formControlName="gender">
        <option value="">Select Gender</option>

        @for (gender of genderOptions; track gender.value) {
            <option [value]="gender.value">
                {{ gender.label }}
            </option>
        }
    </select>

    <br><br>

    <button type="submit">Predict</button>

</form>
